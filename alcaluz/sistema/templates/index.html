<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registrar Luminaria</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../static/css/styles.css" />
    <script src="../static/jscript/scripts.js" defer></script>
  </head>
  <body>
    <!--════════════════════════════ INICIO LUMINARIAS ════════════════════════════ -->
    <div class="page active" id="page-luminarias"><!--page active porque es la primera página que se muestra -->
      <div class="section-hdr">
        <h2 style="font-size: 20px">💡 Luminarias</h2>
        <button class="btn btn-primary" onclick="showPage('reg-lum', null)">
          ＋ Registrar luminaria
        </button>
      </div>
      <div class="filter-bar">
        <select class="form-control">
          <option>Todas las zonas</option>
        </select>
      </div>

      <div class="TablaPrincipal">
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Código</th>
                <th>Potencia</th>
                <th>Zona</th>
                <th>Red</th>
                <th>Instalación</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><strong>1</strong></td>
                <td>150W</td>
                <td>Zona Norte</td>
                <td>1</td>
                <td>12/01/2023</td>
              </tr>
              <tr>
                <td><strong>2</strong></td>
                <td>250W</td>
                <td>Zona Centro</td>
                <td>2</td>
                <td>05/03/2022</td>
              </tr>
              <tr>
                <td><strong>3</strong></td>
                <td>200W</td>
                <td>Zona Este</td>
                <td>3</td>
                <td>18/07/2024</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <!--════════════════════════════ FIN LUMINARIAS ════════════════════════════ -->

    <!--════════════════════════════ INICIO Formulario de registro de luminaria) ══════════════════════ -->
    <div class="page" id="page-reg-lum">
        <div class="section-hdr">
          <h2>💡 Registrar luminaria</h2>
          <button class="btn btn-ghost" onclick="showPage('luminarias', null)">
            ← Volver
          </button>
        </div>

        <div class="TablaForm">           
                <div class="stepe">
                    <h1>Formulario de registro de luminaria</h1>
                </div>
        
    
            <!--FORMULARIO -->
            <div class="form-grid">
                <div class="form-group">
                  <label>Potencia (W) *</label>
                  <input class="form-control" type="number" placeholder="150">
                </div>
                <div class="form-group">
                  <label>Zona *</label>
                  <select class="form-control"><option>Seleccionar…</option><option>Zona Norte</option><option>Zona Centro</option><option>Zona Sur</option><option>Zona Este</option></select>
                </div>
            
                <div class="form-group">
                  <label>Red de control *</label>
                  <select class="form-control"><option>Seleccionar…</option><option>RED-01</option><option>RED-02</option><option>RED-07</option></select>
                </div>
            
                <div class="form-group">
                  <label>Ubicacion/ Referencia *</label>
                  <input class="form-control" placeholder="Ej: Av. Principal frente a parque central">     
                </div>
            
                <div class="form-group">
                  <label>Fecha de instalación *</label>
                  <input class="form-control" type="date">
                </div>
                <div class="action-row">
                  <button class="btn btn-primary">💾 Guardar luminaria</button>
                </div>
            </div><!--FIN FORMULARIO -->
        </div>     
    </div>
    <!--════════════════════════ FIN Formulario de registro de luminaria ══════════════════════ -->
  </body>
</html>
